<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

  /* uhh i read somewhere this typa shit fixes firefox issues*/
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:             #3b4252;
    --bg-deep:        #2e3440;
    --bg-deeper:      #242933; /* uhh this aint in nord color pallete but its the bg of the nord website*/
    --border:         #5e81ac;
    --tab-active-bg:  #434c5e;
    --text:           #eceff4;
    --text-dim:       #e5e9f0;
    --text-muted:     #d8dee9;
    --text-on-active: #eceff4;
    --accent:         #5e81ac;
    --tabbar-h:       36px;
  }


/* actual content*/
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deeper);
    font-family: Arial, sans-serif;
    color: var(--text);
  }

  #app {
    display: grid;
    grid-template-rows: var(--tabbar-h) 1fr;
    height: 100vh;
  }


  #sidebar {
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: row;
    align-items: center;
    overflow: hidden;
    z-index: 10;
  }

  #tab-list {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    flex-direction: row;
    scrollbar-width: none;
  }

  #tab-list::-webkit-scrollbar { display: none; }

  .tab-item, #add-tab-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    cursor: pointer;
    border: none;
    border-right: 1px solid var(--border);
    height: var(--tabbar-h);
    min-width: 120px;
    max-width: 200px;
    text-align: left;
    font-family: Arial, sans-serif;
    background: transparent;
    flex-shrink: 0;
  }

  .tab-item.active {
    background: var(--tab-active-bg);
  }

  .tab-icon {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-top: 1px;
  }

  .tab-icon img {
    width: 14px;
    height: 14px;
    display: block;
  }

  .tab-icon i {
    font-size: 11px;
    color: var(--text-dim);
  }

  .tab-item.active .tab-icon i { color: var(--accent); }

  .tab-title {
    flex: 1;
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-dim);
  }

  .tab-item.active .tab-title {
    color: var(--text-on-active);
    font-weight: 600;
  }

  .tab-close {
    width: 16px;
    height: 16px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    opacity: 0;
    font-size: 10px;
  }

  .tab-item:hover .tab-close { opacity: 1; }
  .tab-item.active .tab-close { color: var(--accent); opacity: 0; }
  .tab-item.active:hover .tab-close { opacity: 1; }

  #add-tab-btn {
    min-width: unset;
    max-width: unset;
    padding: 0 12px;
    border-right: none;
    font-size: 12px;
    flex-shrink: 0;
  }

  #add-tab-btn .tab-icon i {
    font-size: 11px;
    color: var(--text-dim);
  }


  #content {
    position: relative;
    background: var(--bg-deeper);
    overflow: hidden;
  }

  .iframe-pane {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
  }

  /* }, a reminder of the hard dsay fought against my laptop keyboard */

  .iframe-pane.visible {
    pointer-events: all;
  }

  .iframe-pane iframe {
    width: 100%;
    height: 100%;
    border: none;
  }


  .newtab-overlay {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    overflow: hidden;
  }

  .newtab-overlay.hidden {
    display: none;
  }

  .newtab-fuzzy {
    pointer-events: none;
    position: absolute;
    top: -100%;
    left: -100%;
    right: -100%;
    bottom: -100%;
    opacity: 0.15;
    background-image: url("/noise.png");
    animation: fuzzy-move 0.4s linear infinite;
    z-index: 0;
  }

  @keyframes fuzzy-move {
    0%   { transform: translateX(-10%) translateY(-10%); }
    50%  { transform: translateX(10%)  translateY(10%);  }
    100% { transform: translateX(-10%) translateY(-10%); }
  }

  .newtab-center {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateY(-20%);
    width: 100%;
  }

  .newtab-overlay input[type=text] {
    width: 100%;
    max-width: 480px;
    padding: 10px 14px;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: Arial, sans-serif;
    font-size: 14px;
    outline: none;
  }

  .newtab-overlay input[type=text]::placeholder { color: var(--text-muted); }
  .newtab-overlay input[type=text]:focus { border-color: var(--accent); }

  .shortcut-row {
    display: flex;
    gap: 12px;
    margin-top: 14px;
  }

  .shortcut-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: Arial, sans-serif;
    font-size: 11px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
  }

  .shortcut-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .shortcut-btn img {
    width: 20px;
    height: 20px;
    display: block;
  }

  #no-tabs {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    pointer-events: none;
  }

  #no-tabs-icon {
    font-size: 48px;
    color: var(--text-muted);
  }

  #no-tabs-hint {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div id="tab-list"></div>
    <button id="add-tab-btn">
      <div class="tab-icon"><i class="fa-solid fa-plus"></i></div>
    </button>
  </aside>

  <main id="content">
    <div id="no-tabs">
      <div id="no-tabs-icon"><i class="fa-regular fa-window-restore"></i></div>
      <div id="no-tabs-hint">no tabs open</div>
    </div>
  </main>
</div>

<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "vdqfqjbu3l");
</script>


<script src="https://unpkg.com/motion@12.36.0/dist/motion.js"></script> /* bro*/
<script>
  const { animate } = Motion;

  let tabs = [];
  let activeId = null;
  let idCounter = 0;
  let searchEngine = "https://duckduckgo.com?q="
  const tabList = document.getElementById('tab-list'); // why dont js and html/css just share naming conventions broskino
  const content = document.getElementById('content');
  const noTabs = document.getElementById('no-tabs');
  const addBtn = document.getElementById('add-tab-btn');

  function resolveInput(input) {
    if (/^[^\s]+\.[^\s]+/.test(input)) {
      const withProtocol = /^https?:\/\//i.test(input) ? input : 'https://' + input;
      return '/404.html?q=' + encodeURIComponent(withProtocol);
    }
    return '/404.html?q=' + encodeURIComponent(searchEngine + encodeURIComponent(input));
  }

  function createNewTabOverlay(tabThing) {
    const overlay = document.createElement('div');
    overlay.id = 'overlay-' + tabThing.id;
    overlay.className = 'newtab-overlay';

    const fuzzy = document.createElement('div');
    fuzzy.className = 'newtab-fuzzy';
    overlay.appendChild(fuzzy);

    const input = document.createElement('input');
    input.id = 'search-' + tabThing.id;
    input.type = 'text';
    input.placeholder = 'search the web freely'; // ohhh lowercase text is so tuff gng

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.value.trim()) {
        const query = input.value.trim();
        const proxyUrl = resolveInput(query); // fixed

        tabThing.url = proxyUrl;
        tabThing.title = query;
        tabThing.searched = true;

        overlay.classList.add('hidden'); // shoutout to david for being a good boy and coming up with most of this
        tabThing.iframe.src = proxyUrl;

        updateTabs();
      }
    });

    const center = document.createElement('div');
    center.className = 'newtab-center';
    center.appendChild(input);

    const shortcuts = [
      { label: 'tiktok', url: 'https://tiktok.com/', icon: '/tiktok.ico', iconDirect: '/tiktok.ico' },
      { label: 'movies / tv', url: 'https://www.cinezo.net/', icon: '/movie.png', iconDirect: '/movie.png' },
      { label: 'music', url: 'https://tidal.squid.wtf/', icon: '/music.png', iconDirect: '/music.png' },
      { label: 'discord', url: 'https://discord.com/', icon: '/discord.jpg', iconDirect: '/discord.jpg' },
      { label: 'games', url: '/games.html', icon: null, iconDirect: null },
    ];

    const row = document.createElement('div');
    row.className = 'shortcut-row';

    shortcuts.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'shortcut-btn';

      const iconEl = s.iconDirect
        ? Object.assign(document.createElement('img'), { src: s.iconDirect, alt: s.label })
        : Object.assign(document.createElement('i'), { className: 'fa-solid fa-gamepad', style: 'font-size:20px' });

      const label = document.createElement('span');
      label.textContent = s.label;

      btn.appendChild(iconEl);
      btn.appendChild(label);
      btn.addEventListener('click', () => {
        const proxyUrl = s.url === '/games.html' ? '/games.html' : '/404.html?q=' + encodeURIComponent(s.url);
        tabThing.url = proxyUrl;
        tabThing.title = s.label;
        tabThing.searched = true;
        overlay.classList.add('hidden');
        tabThing.iframe.src = proxyUrl;
        updateTabs();
      });

      row.appendChild(btn);
    });

    center.appendChild(row);
    overlay.appendChild(center);
    tabThing.focusSearch = () => document.getElementById('search-' + tabThing.id)?.focus();

    return overlay;
  }

  function buildTabEl(tab) {
    const el = document.createElement('div');
    el.id = 'tab-' + tab.id;
    el.className = 'tab-item' + (tab.id === activeId ? ' active' : '');

    const tabicon = document.createElement('div');
    tabicon.id = 'tab-icon-' + tab.id;
    tabicon.className = 'tab-icon';
    tabicon.innerHTML = '<i class="fa-solid fa-globe"></i>'; // we love font aweseome

    const titleEl = document.createElement('span');
    titleEl.id = 'tab-title-' + tab.id;
    titleEl.className = 'tab-title';
    titleEl.textContent = tab.title;

    const closeBtn = document.createElement('button');
    closeBtn.id = 'tab-close-' + tab.id;
    closeBtn.className = 'tab-close';
    closeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
    closeBtn.title = 'close tab';
    closeBtn.addEventListener('click', e => { e.stopPropagation(); closeTab(tab.id); });

    el.appendChild(tabicon);
    el.appendChild(titleEl);
    el.appendChild(closeBtn);
    el.addEventListener('click', () => setActive(tab.id));
    return el;
  }

  function updateTabs() {
    tabs.forEach(tab => {
      if (!tab.el) return;
      tab.el.className = 'tab-item' + (tab.id === activeId ? ' active' : '');

      const titleEl = document.getElementById('tab-title-' + tab.id);
      if (titleEl) titleEl.textContent = tab.title;

      const iconEl = document.getElementById('tab-icon-' + tab.id);
      if (iconEl) {
        iconEl.innerHTML = '<i class="fa-solid fa-globe"></i>';
      }
    });
  }

  function createTab() {
    const id = ++idCounter;

    const pane = document.createElement('div');
    pane.id = 'pane-' + id;
    pane.className = 'iframe-pane';

    const iframe = document.createElement('iframe');
    iframe.id = 'iframe-' + id;
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation'); // mayb stop using sandbox later so i can have movie players n shi
    pane.appendChild(iframe);

    const tabThing = { id, url: null, title: 'new tab', pane, iframe, searched: false, focusSearch: null, el: null };

    const overlay = createNewTabOverlay(tabThing);
    pane.appendChild(overlay);
    content.appendChild(pane);

    // animate new tab overlay w/ apps and stuff in
    const searchInput = pane.querySelector('input[type=text]');
    const shortcutRow = pane.querySelector('.shortcut-row');
    if (searchInput) animate(searchInput, { opacity: [0, 1], y: [18, 0] }, { duration: 0.35, easing: 'ease-out', delay: 0.05 });
    if (shortcutRow) animate(shortcutRow, { opacity: [0, 1], y: [18, 0] }, { duration: 0.35, easing: 'ease-out', delay: 0.15 });

    const el = buildTabEl(tabThing);
    tabThing.el = el;
    tabs.push(tabThing);
    tabList.appendChild(el);

    // animate tab moving in
    animate(el, { opacity: [0, 1], x: [-10, 0] }, { duration: 0.18, easing: 'ease-out' });

    setActive(id);
  }

  function closeTab(id) {
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;

    const tab = tabs[idx];
    tabs.splice(idx, 1);

    if (activeId === id) {
      activeId = null;
      if (tabs.length > 0) setActive(tabs[Math.max(0, idx - 1)].id);
    }
    updateTabs();
    updateEmpty();

    // animate out then remobe
    animate(tab.el, { opacity: [1, 0], x: [0, -8] }, { duration: 0.15, easing: 'ease-in' });
    setTimeout(() => {
      tab.el.remove();
      document.getElementById('pane-' + id)?.remove();
    }, 160); // "we love google gemini!!!!!!!!"
  }

  function setActive(id) {
    activeId = id;
    tabs.forEach(t => {
      const pane = document.getElementById('pane-' + t.id);
      if (!pane) return;
      if (t.id === id) {
        pane.style.opacity = '0';
        pane.classList.add('visible');
        animate(pane, { opacity: [0, 1] }, { duration: 0.15, easing: 'ease-out' });
      } else {
        pane.classList.remove('visible');
        pane.style.opacity = '0';
      }
    });

    const tab = tabs.find(t => t.id === id);
    if (tab && !tab.searched && tab.focusSearch) {
      setTimeout(() => tab.focusSearch(), 50);
    }

    updateTabs();
    updateEmpty();
  }

  function updateEmpty() {
    noTabs.style.display = tabs.length === 0 ? 'flex' : 'none';
  }


  addBtn.addEventListener('click', () => createTab());
  updateEmpty();

  window.addEventListener('message', (e) => {
    console.log('[index] title received:', e.data, 'from ', e.origin);
    if (e.data?.type !== 'tab-title') return;
    const tab = tabs.find(t => t.iframe.contentWindow === e.source);
    console.log('[index] source match:', tab ? `tab ${tab.id}` : 'no match', '| tabs:', tabs.map(t => t.id));
    if (!tab) return;
    tab.title = e.data.title;
    updateTabs();
  });
</script>
</body>
</html>
